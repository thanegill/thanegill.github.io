{% extends "base.html" %}

{% block title %}{{ page.title }} &ndash; {{ SITENAME }}{% endblock title %}

{% block header %}
<header class="intro-header">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
        <div class="site-heading">
          <h1>{{ page.title }}</h1>
        </div>
      </div>
    </div>
  </div>
</header>
{% endblock header %}

{% block content %}
<div class="container">
  <div class="row">
    <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
      {{ page.content }}
    </div>
  </div>
</div>
{% endblock content %}
