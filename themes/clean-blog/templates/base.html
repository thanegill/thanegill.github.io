<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ SITENAME }}">
  <meta name="author" content="{{ AUTHOR }}">
  <link href="{{ SITEURL }}/feeds/all.atom.xml" type="application/rss+xml" rel="alternate" title="{{ SITENAME }} RSS">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css">
  <title>{% block title %}{{ SITENAME }}{% endblock title %}</title>
  <link href="{{ SITEURL }}/theme/css/bootstrap.css" rel="stylesheet" type="text/css">
  <link href="{{ SITEURL }}/theme/css/clean-blog.css" rel="stylesheet" type="text/css">
  <link href="{{ SITEURL }}/theme/css/pygments.css" rel="stylesheet" type="text/css">
  <style>.intro-header { background-image: url('{{ SITEURL }}/theme/images/default.jpg') }</style>
  {% block extra_head %}{% endblock extra_head %}
</head>
<body>

  <nav class="navbar navbar-default navbar-custom navbar-fixed-top">
    <div class="container-fluid">
      <div class="navbar-header page-scroll">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#navbar-collapse">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="{{ SITEURL }}/" aria-label="{{ SITENAME }} home"><i class="fas fa-anchor"></i></a>
      </div>
      <div class="collapse navbar-collapse" id="navbar-collapse">
        <ul class="nav navbar-nav navbar-right">
          <li><a href="{{ SITEURL }}/">Blog</a></li>
          <li><a href="{{ SITEURL }}/about/">About</a></li>
          <li><a href="{{ SITEURL }}/resume/">Résumé</a></li>
          <li><a class="fas fa-rss-square" href="{{ SITEURL }}/feeds/all.atom.xml" aria-label="RSS Feed"></a></li>
        </ul>
      </div>
    </div>
  </nav>

  {% block header %}{% endblock header %}

  {% block content %}{% endblock content %}

  <hr id="page_footer">
  <footer>
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
          <ul class="list-inline text-center">
            <li>
              <a href="{{ MASTODON_URL }}" rel="me" aria-label="Mastodon">
                <span class="fa-stack fa-lg">
                  <i class="fas fa-circle fa-stack-2x"></i>
                  <i class="fab fa-mastodon fa-stack-1x fa-inverse"></i>
                </span>
              </a>
            </li>
            <li>
              <a href="https://github.com/{{ GITHUB_USERNAME }}" aria-label="GitHub">
                <span class="fa-stack fa-lg">
                  <i class="fas fa-circle fa-stack-2x"></i>
                  <i class="fab fa-github fa-stack-1x fa-inverse"></i>
                </span>
              </a>
            </li>
            <li>
              <a href="mailto:{{ EMAIL_ADDRESS }}" aria-label="Email">
                <span class="fa-stack fa-lg">
                  <i class="fas fa-circle fa-stack-2x"></i>
                  <i class="far fa-envelope fa-stack-1x fa-inverse"></i>
                </span>
              </a>
            </li>
          </ul>
          <p class="copyright text-muted">Copyright &copy; {{ AUTHOR }} {{ CURRENT_YEAR }}</p>
          <p class="copyright text-muted"><a href="https://github.com/thanegill/thanegill.github.io">Hosted with Github pages</a></p>
        </div>
      </div>
    </div>
  </footer>

  <script src="{{ SITEURL }}/theme/js/jquery.js"></script>
  <script src="{{ SITEURL }}/theme/js/bootstrap.js"></script>
  <script src="{{ SITEURL }}/theme/js/clean-blog.js"></script>
</body>
</html>
